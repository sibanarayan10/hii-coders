spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${EMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  application:
    name: hii-coders
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_AUTH_CLIENT_ID}
            client-secret: ${GOOGLE_AUTH_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_AUTH_CLIENT_ID}
            client-secret: ${GITHUB_AUTH_CLIENT_SECRET}
            scope:
              - user:email
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true
  cors:
    allowed-origins: ${ALLOWED_ORIGIN}
server:
  port: 8083
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accept-count: 50
    max-connections: 200
  servlet:
    register-default-servlet: false
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
  frontend:
    url: ${FRONTEND_URL}
  backend:
    url: ${BACKEND_URL}
  cookie:
    secure: true
    same-site: None
    domain: ${COOKIE_DOMAIN}
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}